version: '3.8'

services:
  piper-train:
    build:
      context: .
      dockerfile: Dockerfile.train
    container_name: piper-train
    volumes:
      # Map training datasets generated by the API
      - ./data/training_datasets:/datasets
      # Map training runs output (checkpoints, logs, configs)
      - ./data/training_runs:/training_runs
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
    environment:
      - CUDA_VISIBLE_DEVICES=0
    restart: unless-stopped
